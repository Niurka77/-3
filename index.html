<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sempiterno ♾️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Special+Elite&family=Cinzel:wght@700&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --vintage-paper: #e4d5b7;
            --ink: #3e2723;
            --love-red: #b71c1c;
            --gold: #b8860b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            overflow: hidden;
            height: 100vh;
            font-family: 'Cormorant Garamond', serif;
        }

        /* --- ESTILOS DE LA PORTADA (SPLASH) --- */
        #splash {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1b2a4e 0%, #0a0a1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100;
            transition: opacity 1s ease, visibility 1s;
        }

        /* Estrellas de fondo */
        .stars { position: fixed; width: 100%; height: 100%; z-index: -1; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        .splash-content h1 {
            font-size: 5rem; color: #f8e0e0; letter-spacing: 10px;
            text-shadow: 0 0 30px var(--gold); font-weight: 300;
        }

        .btn-entrar {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid var(--gold);
            color: #f8e0e0;
            padding: 15px 40px;
            font-size: 1.5rem;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
        }
        .btn-entrar:hover { background: var(--gold); color: #000; transform: scale(1.1); }

        /* --- ESTILOS DEL MAPA Y ESCENAS --- */
        .stage {
            display: none; /* Oculto al inicio */
            width: 100vw; height: 100vh;
            background: radial-gradient(circle, #3d2b1f 0%, #1a1a1a 100%);
            justify-content: center; align-items: center;
        }

        .scene {
            display: none;
            width: 95%; height: 90%;
            background: var(--vintage-paper);
            border: 10px solid var(--ink);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            position: relative;
            animation: unfold 0.6s ease-out forwards;
            font-family: 'Special Elite', cursive;
        }
        @keyframes unfold { from { transform: scaleY(0); opacity: 0; } to { transform: scaleY(1); opacity: 1; } }
        
        .active { display: block; }
        .flex-active { display: flex; }

        /* Marcadores del Mapa */
        .map-world { width: 100%; height: 100%; background-image: url('https://www.transparenttextures.com/patterns/old-map.png'); position: relative; }
        .marker { position: absolute; text-align: center; transition: 0.3s; cursor: pointer; }
        .marker:hover { transform: scale(1.1); }
        .x-mark { font-size: 3rem; color: var(--love-red); font-weight: bold; }
        .label { background: var(--ink); color: var(--vintage-paper); padding: 2px 10px; font-size: 0.8rem; }

        /* Utilitarios */
        .back-btn { position: absolute; bottom: 20px; left: 20px; padding: 10px; background: var(--ink); color: white; border: none; cursor: pointer; }
        .grid-cartas { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 20px; padding: 40px; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="stars" id="stars"></div>
        <div class="splash-content">
            <h1>SEMPITERNO</h1>
            <p style="color: #d4b48c; font-style: italic; font-size: 1.5rem;">Un viaje eterno a nuestro amor</p>
            <button class="btn-entrar" onclick="entrarAlMapa()">Entrar</button>
        </div>
    </div>

    <div class="stage" id="main-stage">

        <div id="scene-map" class="scene active">
            <div class="map-world">
                <h1 style="text-align: center; margin-top: 20px; font-family: 'Cinzel'; color: var(--ink);">Sempiterno ♾️</h1>
                
                <div class="marker" style="top: 20%; left: 20%;" onclick="openScene('scene-letters')">
                    <div class="x-mark">X</div>
                    <div class="label">ÁBRELOS CUANDO...</div>
                </div>

            <div class="marker" style="top: 50%; left: 50%;" onclick="window.location.href='obbi.html'">
                    <div class="x-mark">X</div>
                    <div class="label">EL OBBIE DE NOSOTROS</div>
                </div>
       <div class="marker" style="top: 70%; left: 80%;" onclick="window.location.href='scrapbook.html'">
                <div class="x-mark">X</div>
                <div class="label">LIBRO DE RECUERDOS</div>
            </div>

                <div style="position: absolute; bottom: 20px; right: 40px; font-family: 'Great Vibes'; font-size: 2rem; color: var(--ink);">
                    Niurka
                </div>
            </div>
        </div>

        <div id="scene-letters" class="scene">
            <h2 style="padding: 20px; border-bottom: 2px solid var(--ink); color: var(--ink);">C:/User/Recuerdos/Cartas</h2>
            <div class="grid-cartas" id="cartas-container"></div>
            <button class="back-btn" onclick="openScene('scene-map')">Volver al Mapa</button>
        </div>

        <div id="scene-game" class="scene">
            <h2 style="text-align: center; margin-top: 10px; color: var(--ink);">Usa las flechas para moverte</h2>
            <canvas id="game-canvas" width="800" height="400" style="background:#eee; display:block; margin: 20px auto; border: 5px solid var(--ink);"></canvas>
            <button class="back-btn" onclick="openScene('scene-map')">Salir del Juego</button>
        </div>

    </div>

    <script>
        // 1. Lógica de Estrellas
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = star.style.height = Math.random() * 3 + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();

        // 2. FUNCIÓN PARA ENTRAR (Cambio de Portada a Mapa)
        function entrarAlMapa() {
            const splash = document.getElementById('splash');
            const stage = document.getElementById('main-stage');
            
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.visibility = 'hidden';
                stage.style.display = 'flex'; // Muestra el contenedor del mapa
            }, 1000);
        }

        // 3. Navegación entre escenas del mapa
        function openScene(id) {
            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'scene-letters') renderCartas();
            if(id === 'scene-game') startObbie();
        }

        // 4. Lógica de Cartas
        const misCartas = [
            { title: "Estés feliz", date: "2024-01-01", msg: "¡Amo verte sonreír! ☀️" },
            { title: "Me extrañes", date: "2024-05-13", msg: "Estoy a solo un mensaje. ❤️" },
            { title: "Aniversario", date: "2026-10-15", msg: "¡Sempiternos! ♾️" }
        ];

        function renderCartas() {
            const container = document.getElementById('cartas-container');
            container.innerHTML = '';
            const hoy = new Date();
            misCartas.forEach(carta => {
                const isLocked = hoy < new Date(carta.date);
                const folder = document.createElement('div');
                folder.style.textAlign = "center";
                folder.style.cursor = "pointer";
                folder.innerHTML = `<div style="font-size:3rem">${isLocked ? '📁🔒' : '📂'}</div><p>${carta.title}</p>`;
                folder.onclick = () => alert(isLocked ? "Aún no es tiempo..." : carta.msg);
                container.appendChild(folder);
            });
        }

        // 5. Minijuego simple (Obbie)
        function startObbie() {
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            let x = 50;
            function draw() {
                if(!document.getElementById('scene-game').classList.contains('active')) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "brown"; ctx.fillRect(0, 380, 800, 20); // Suelo
                ctx.fillStyle = "red"; ctx.fillRect(x, 350, 30, 30); // Jugador
                requestAnimationFrame(draw);
            }
            window.onkeydown = (e) => {
                if(e.key === "ArrowRight") x += 15;
                if(e.key === "ArrowLeft") x -= 15;
            };
            draw();
        }
    </script>
</body>
</html>
