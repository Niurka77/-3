<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sempiterno ♾️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Special+Elite&family=Cinzel:wght@700&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --vintage-paper: #e4d5b7;
            --ink: #3e2723;
            --love-red: #b71c1c;
            --gold: #b8860b;
            --win95-gray: #c0c0c0;
            --win95-dark: #808080;
            --win95-darker: #0a0a0a;
            --win95-blue: #000080;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            overflow-x: hidden;
            height: 100vh;
            font-family: 'Cormorant Garamond', serif;
        }

        /* --- ESTILOS DE LA PORTADA (SPLASH) --- */
        #splash {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1b2a4e 0%, #0a0a1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100;
            transition: opacity 1s ease, visibility 1s;
        }

        .stars { position: fixed; width: 100%; height: 100%; z-index: -1; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        .splash-content h1 {
            font-size: 5rem; color: #f8e0e0; letter-spacing: 10px;
            text-shadow: 0 0 30px var(--gold); font-weight: 300;
            animation: titleGlow 3s ease-in-out infinite;
        }
        @keyframes titleGlow {
            0%, 100% { text-shadow: 0 0 30px var(--gold); }
            50% { text-shadow: 0 0 50px var(--gold), 0 0 80px var(--love-red); }
        }

        .btn-entrar {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid var(--gold);
            color: #f8e0e0;
            padding: 15px 40px;
            font-size: 1.5rem;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
            font-family: 'Cinzel', serif;
        }
        .btn-entrar:hover { 
            background: var(--gold); 
            color: #000; 
            transform: scale(1.1); 
            box-shadow: 0 0 30px var(--gold);
        }

        .stage {
            display: none;
            width: 100vw; height: 100vh;
            background: #000;
            justify-content: center; align-items: center;
        }

        .scene {
            display: none;
            width: 95%; height: 90%;
            border: 10px solid var(--ink);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            position: relative;
            animation: unfold 0.6s ease-out forwards;
            font-family: 'Special Elite', cursive;
            overflow-y: auto;
        }
        
        .scene::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 3px solid transparent;
            border-radius: 5px;
            background: linear-gradient(45deg, transparent, var(--gold), transparent) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0.3;
        }

        @keyframes unfold { 
            from { transform: scaleY(0); opacity: 0; } 
            to { transform: scaleY(1); opacity: 1; } 
        }
        
        .active { display: block; }
        .flex-active { display: flex; }

        .map-world { 
            width: 100%; height: 100%; 
            background-image: url('mapa.webp'); 
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            position: relative; 
        }
        
        .marker { 
            position: absolute; 
            text-align: center; 
            transition: 0.3s; 
            cursor: pointer; 
            animation: pulseMap 2s ease-in-out infinite;
            z-index: 10;
        }
        .marker:nth-child(2) { animation-delay: 0.3s; }
        .marker:nth-child(3) { animation-delay: 0.6s; }
        .marker:nth-child(4) { animation-delay: 0.9s; }
        
        .marker:hover { 
            transform: scale(1.15); 
            z-index: 20;
        }
        
        @keyframes pulseMap {
            0%, 100% { 
                transform: scale(1); 
                filter: drop-shadow(0 0 5px var(--gold)); 
            }
            50% { 
                transform: scale(1.05); 
                filter: drop-shadow(0 0 15px var(--love-red)); 
            }
        }
        
        .x-mark { 
            font-size: 3rem; 
            color: var(--love-red); 
            font-weight: bold; 
            text-shadow: 2px 2px 0 var(--ink);
            transition: transform 0.3s;
        }
        .marker:hover .x-mark { transform: rotate(15deg) scale(1.1); }
        
        .label { 
            background: var(--ink); 
            color: var(--vintage-paper); 
            padding: 4px 12px; 
            font-size: 0.85rem; 
            border-radius: 3px;
            margin-top: 5px;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
        }

        .back-btn { 
            position: absolute; 
            bottom: 20px; 
            left: 20px; 
            padding: 12px 25px; 
            background: var(--ink); 
            color: var(--vintage-paper); 
            border: 2px solid var(--gold); 
            cursor: pointer; 
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            border-radius: 30px;
            transition: 0.3s;
            z-index: 30;
        }
        .back-btn:hover {
            background: var(--gold);
            color: var(--ink);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(184, 134, 11, 0.4);
        }

        /* === ESTILOS WINDOWS 95 PARA LA SECCIÓN DE CARTAS === */
        #scene-letters {
            background: var(--win95-gray);
            border: 2px solid;
            border-color: #ffffff var(--win95-darker) var(--win95-darker) #ffffff;
            padding: 3px;
            font-family: 'MS Sans Serif', 'Tahoma', 'Arial', sans-serif;
        }

        .win95-title-bar {
            background: var(--win95-blue);
            padding: 2px 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2px;
        }

        .win95-title-text {
            color: white;
            font-weight: bold;
            font-size: 11px;
            font-family: 'MS Sans Serif', 'Tahoma', sans-serif;
        }

        .win95-title-buttons {
            display: flex;
            gap: 2px;
        }

        .win95-btn-title {
            width: 16px;
            height: 14px;
            background: var(--win95-gray);
            border: 1px solid;
            border-color: #ffffff var(--win95-darker) var(--win95-darker) #ffffff;
            font-size: 9px;
            font-family: 'MS Sans Serif', 'Tahoma', sans-serif;
            font-weight: bold;
            padding: 0;
            line-height: 12px;
            text-align: center;
            cursor: pointer;
        }

        .win95-btn-title:active {
            border-color: var(--win95-darker) #ffffff #ffffff var(--win95-darker);
        }

        .win95-menu-bar {
            display: flex;
            gap: 10px;
            font-size: 11px;
            padding: 2px 5px;
            color: #000;
            border-bottom: 1px solid var(--win95-dark);
            margin-bottom: 5px;
            font-family: 'MS Sans Serif', 'Tahoma', sans-serif;
        }

        .win95-menu-item {
            cursor: default;
        }

        .win95-menu-item u {
            text-decoration: underline;
        }

        .win95-content {
            background: #ffffff;
            border: 2px inset var(--win95-dark);
            height: calc(100% - 75px);
            overflow-y: auto;
            padding: 15px;
        }

        /* Icono de carpeta estilo Windows 95 (sin emojis) */
        .win95-folder-icon {
            width: 32px;
            height: 24px;
            background: #fdf1b8;  /* Color crema de carpeta Win95 */
            position: relative;
            margin: 0 auto 8px;
            border: 1px solid #000;
            box-shadow: 1px 1px 0 #808080;
        }

        .win95-folder-icon::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -1px;
            width: 12px;
            height: 5px;
            background: #fdf1b8;
            border: 1px solid #000;
            border-bottom: none;
        }

        .win95-folder-icon-locked {
            background: #d4d0c8;
            opacity: 0.7;
        }

        .win95-folder-icon-locked::after {
            content: '';
            position: absolute;
            top: 2px;
            right: 2px;
            width: 8px;
            height: 8px;
            background: #000080;
            border-radius: 1px;
        }

        /* Grid de iconos estilo Win95 */
        .win95-icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
            padding: 10px;
        }

        .win95-icon-item {
            text-align: center;
            cursor: pointer;
            padding: 5px;
            border: 1px solid transparent;
            font-family: 'MS Sans Serif', 'Tahoma', sans-serif;
        }

        .win95-icon-item:hover {
            background: #000080;
            color: white;
            border: 1px dotted #ffffff;
        }

        .win95-icon-item:hover .win95-folder-icon {
            background: #fff2c0;
        }

        .win95-icon-title {
            font-size: 11px;
            color: #000;
            word-wrap: break-word;
            margin-top: 4px;
        }

        .win95-icon-item:hover .win95-icon-title {
            color: white;
        }

        .win95-icon-date {
            font-size: 9px;
            color: #666;
        }

        .win95-icon-item:hover .win95-icon-date {
            color: #aaccff;
        }

        /* Modal estilo Win95 */
        .win95-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            animation: fadeIn 0.2s ease;
            padding: 20px;
        }

        .win95-modal {
            background: var(--win95-gray);
            border: 2px solid;
            border-color: #ffffff var(--win95-darker) var(--win95-darker) #ffffff;
            padding: 2px;
            min-width: 300px;
            max-width: 500px;
            width: 100%;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
            font-family: 'MS Sans Serif', 'Tahoma', sans-serif;
        }

        .win95-modal-title {
            background: var(--win95-blue);
            color: white;
            padding: 4px 6px;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .win95-modal-close {
            background: var(--win95-gray);
            border: 1px solid;
            border-color: #ffffff var(--win95-darker) var(--win95-darker) #ffffff;
            width: 18px;
            height: 16px;
            font-size: 12px;
            line-height: 14px;
            text-align: center;
            cursor: pointer;
            color: #000;
        }

        .win95-modal-close:active {
            border-color: var(--win95-darker) #ffffff #ffffff var(--win95-darker);
        }

        .win95-modal-content {
            background: #ffffff;
            border: 2px inset var(--win95-dark);
            padding: 20px;
            margin: 4px;
        }

        .win95-modal-text {
            font-family: 'MS Sans Serif', 'Tahoma', sans-serif;
            font-size: 12px;
            color: #000;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .win95-modal-signature {
            font-family: 'Great Vibes', cursive;
            font-size: 24px;
            color: var(--love-red);
            text-align: right;
            margin-top: 15px;
        }

        .win95-modal-button {
            background: var(--win95-gray);
            border: 2px solid;
            border-color: #ffffff var(--win95-darker) var(--win95-darker) #ffffff;
            padding: 8px 20px;
            font-family: 'MS Sans Serif', 'Tahoma', sans-serif;
            font-size: 11px;
            cursor: pointer;
            margin-top: 15px;
            min-width: 100px;
        }

        .win95-modal-button:active {
            border-color: var(--win95-darker) #ffffff #ffffff var(--win95-darker);
        }

        /* Mantener otros estilos existentes */
        .firma {
            font-family: 'Great Vibes', cursive;
            font-size: 2.5rem;
            color: var(--love-red);
            position: absolute;
            bottom: 30px;
            right: 40px;
            animation: writeSig 2s ease-out forwards;
            opacity: 0;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.1);
        }
        @keyframes writeSig {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        #game-canvas {
            background: linear-gradient(180deg, #e4d5b7 0%, #c9b896 100%);
            display: block; 
            margin: 20px auto; 
            border: 5px solid var(--ink);
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #particles {
            position: fixed; 
            inset: 0; 
            pointer-events: none; 
            z-index: 5;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { 
            from { transform: translateY(30px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }
        @keyframes fall {
            to { 
                transform: translateY(100vh) rotate(720deg); 
                opacity: 0; 
            }
        }
        @keyframes floatUp {
            to { 
                transform: translateY(-100vh) translateX(var(--drift, 0)); 
                opacity: 0; 
            }
        }

        @media (max-width: 768px) {
            .splash-content h1 { font-size: 3rem; letter-spacing: 5px; }
            .btn-entrar { padding: 12px 30px; font-size: 1.2rem; }
            
            .marker { transform: scale(0.85); }
            .marker .x-mark { font-size: 2.2rem; }
            .marker .label { font-size: 0.75rem; padding: 3px 8px; }
            
            .win95-icon-grid { 
                grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); 
                gap: 10px;
            }
            
            #game-canvas { 
                width: 95%; 
                height: auto; 
                max-width: 400px; 
            }
            
            .scene {
                width: 98%;
                height: 95%;
                border-width: 6px;
            }
            
            .back-btn {
                bottom: 15px;
                left: 15px;
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .splash-content h1 { font-size: 2.5rem; }
            .win95-icon-grid { grid-template-columns: repeat(2, 1fr); }
            .firma { font-size: 2rem; bottom: 20px; right: 20px; }
        }
    </style>
</head>
<body>

    <!-- Portada / Splash Screen -->
    <div id="splash">
        <div class="stars" id="stars"></div>
        <div class="splash-content">
            <h1>SEMPITERNO</h1>
            <p style="color: #d4b48c; font-style: italic; font-size: 1.5rem; margin: 15px 0;">
                Un viaje eterno a nuestro amor
            </p>
            <button class="btn-entrar" onclick="entrarAlMapa()">✦ Entrar ✦</button>
        </div>
    </div>

    <!-- Contenedor principal del mapa y escenas -->
    <div class="stage" id="main-stage">

        <!-- Escena: Mapa Principal -->
        <div id="scene-map" class="scene active">
            <div class="map-world">
                <h1 style="text-align: center; margin-top: 20px; font-family: 'Cinzel'; color: var(--ink); text-shadow: 1px 1px 0 rgba(255,255,255,0.5);">
                    Sempiterno ♾️
                </h1>
                
                <div class="marker" style="top: 20%; left: 20%;" onclick="openScene('scene-letters')">
                    <div class="x-mark">X</div>
                    <div class="label">Cartas</div>
                </div>

                <div class="marker" style="top: 50%; left: 50%;" onclick="window.location.href='obbi.html'">
                    <div class="x-mark">X</div>
                    <div class="label">Obbie</div>
                </div>

                <div class="marker" style="top: 70%; left: 80%;" onclick="window.location.href='scrapbook.html'">
                    <div class="x-mark">X</div>
                    <div class="label">Recuerdos</div>
                </div>

                <div class="firma">Niurka ♾️</div>
            </div>
        </div>

        <!-- Escena: Cartas con estilo Windows 95 (CORREGIDO) -->
        <div id="scene-letters" class="scene">
            <!-- Barra de título Win95 -->
            <div class="win95-title-bar">
                <div class="win95-title-text">Explorando - C:\RECUERDOS\CARTAS</div>
                <div class="win95-title-buttons">
                    <button class="win95-btn-title" onclick="mostrarAyuda()">?</button>
                    <button class="win95-btn-title" onclick="openScene('scene-map')">X</button>
                </div>
            </div>

            <!-- Barra de menú Win95 -->
            <div class="win95-menu-bar">
                <span class="win95-menu-item"><u>A</u>rchivo</span>
                <span class="win95-menu-item"><u>E</u>dición</span>
                <span class="win95-menu-item"><u>V</u>er</span>
                <span class="win95-menu-item"><u>A</u>yuda</span>
            </div>

            <!-- Contenido con iconos de carpetas Win95 -->
            <div class="win95-content" id="cartas-container">
                <!-- Las cartas se renderizarán aquí con JavaScript -->
            </div>
        </div>

        <!-- Escena: Minijuego -->
        <div id="scene-game" class="scene">
            <h2 style="text-align: center; margin-top: 10px; color: var(--ink); font-family: 'Cinzel';">
                🗝️ Encuentra el corazón
            </h2>
            <p style="text-align: center; color: var(--ink); opacity: 0.8; margin-bottom: 10px; font-size: 0.95rem;">
                ← → para mover | ESPACIO para saltar
            </p>
            <canvas id="game-canvas" width="800" height="400"></canvas>
            <button class="back-btn" onclick="openScene('scene-map')">← Salir</button>
        </div>

    </div>

    <!-- Contenedor para partículas flotantes -->
    <div id="particles"></div>

    <script>
        // ============================================
        // 🌟 1. ESTRELLAS DE FONDO (SPLASH)
        // ============================================
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 120; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (2 + Math.random() * 3) + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();

        // ============================================
        // 🚪 2. FUNCIÓN PARA ENTRAR (Splash → Mapa)
        // ============================================
        function entrarAlMapa() {
            const splash = document.getElementById('splash');
            const stage = document.getElementById('main-stage');
            
            splash.style.opacity = '0';
            splash.style.pointerEvents = 'none';
            
            setTimeout(() => {
                splash.style.visibility = 'hidden';
                splash.style.display = 'none';
                stage.style.display = 'flex';
                
                setTimeout(createParticles, 500);
            }, 1000);
        }

        // ============================================
        // 🗺️ 3. NAVEGACIÓN ENTRE ESCENAS
        // ============================================
        function openScene(id) {
            document.querySelectorAll('.scene').forEach(s => {
                s.classList.remove('active');
                s.style.display = 'none';
            });
            
            const target = document.getElementById(id);
            target.style.display = 'block';
            setTimeout(() => target.classList.add('active'), 10);
            
            if(id === 'scene-letters') renderCartasWin95();
            if(id === 'scene-game') startObbie();
        }

        // ============================================
        // 💌 4. FUNCIÓN DE AYUDA PARA WIN95
        // ============================================
        function mostrarAyuda() {
            alert('Windows 95 - Ayuda\n\nEsta carpeta contiene cartas especiales.\nLas carpetas con candado no están disponibles aún.');
        }

        // ============================================
        // 💌 5. SISTEMA DE CARTAS CON ESTILO WIN95
        // ============================================
        const misCartas = [
            { 
                title: "Estés feliz", 
                date: "2026-03-06", 
                msg: "¡Amo verte sonreír! Cada vez que tu risa llena el espacio, mi mundo se ilumina como mil estrellas. Eres mi razón para creer en la magia." 
            },
            { 
                title: "Me extrañes", 
                date: "2026-03-06", 
                msg: "Estoy a solo un mensaje. No importa la distancia, mi corazón siempre está contigo. Te pienso en cada amanecer y en cada suspiro." 
            },
            { 
                title: "Aniversario Proximo", 
                date: "2026-12-13", 
                msg: "¡Sempiternos! Cada momento a tu lado es un tesoro que guardo en el alma. Gracias por elegirme, por quedarte, por amarme. Eres mi eternidad." 
            }
        ];

        function renderCartasWin95() {
            const container = document.getElementById('cartas-container');
            container.innerHTML = '';
            
            const grid = document.createElement('div');
            grid.className = 'win95-icon-grid';
            
            const hoy = new Date();
            
            misCartas.forEach((carta, index) => {
                const fechaCarta = new Date(carta.date);
                const isLocked = hoy < fechaCarta;
                
                const item = document.createElement('div');
                item.className = 'win95-icon-item';
                
                // Icono de carpeta Win95 (sin emojis)
                const folderIcon = document.createElement('div');
                folderIcon.className = 'win95-folder-icon' + (isLocked ? ' win95-folder-icon-locked' : '');
                
                const title = document.createElement('div');
                title.className = 'win95-icon-title';
                title.textContent = carta.title;
                
                const dateSpan = document.createElement('div');
                dateSpan.className = 'win95-icon-date';
                dateSpan.textContent = carta.date;
                
                item.appendChild(folderIcon);
                item.appendChild(title);
                item.appendChild(dateSpan);
                
                item.onclick = () => {
                    if(isLocked) {
                        // Efecto visual de bloqueo estilo Win95
                        item.style.background = '#000080';
                        item.style.color = 'white';
                        setTimeout(() => {
                            item.style.background = '';
                            item.style.color = '';
                        }, 200);
                        alert('Acceso denegado: Esta carta aún no está disponible.\nFecha de apertura: ' + carta.date);
                        return;
                    }
                    showModalWin95(carta);
                };
                
                grid.appendChild(item);
            });
            
            container.appendChild(grid);
        }

        // Modal estilo Windows 95
        function showModalWin95(carta) {
            const modalOverlay = document.createElement('div');
            modalOverlay.className = 'win95-modal-overlay';
            
            modalOverlay.innerHTML = `
                <div class="win95-modal">
                    <div class="win95-modal-title">
                        <span>Carta - ${carta.title}</span>
                        <span class="win95-modal-close" onclick="this.closest('.win95-modal-overlay').remove()">×</span>
                    </div>
                    <div class="win95-modal-content">
                        <div class="win95-modal-text">
                            <strong>Fecha:</strong> ${carta.date}<br><br>
                            ${carta.msg}
                        </div>
                        <div class="win95-modal-signature">
                            ♾️ Con amor, siempre
                        </div>
                        <div style="text-align: center;">
                            <button class="win95-modal-button" onclick="this.closest('.win95-modal-overlay').remove()">
                                Aceptar
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modalOverlay);
            
            // Cerrar con Escape
            document.onkeydown = (e) => {
                if(e.key === 'Escape') {
                    modalOverlay.remove();
                    document.onkeydown = null;
                }
            };
        }

        // ============================================
        // 🎮 6. MINIJUEGO OBBIIE MEJORADO
        // ============================================
        function startObbie() {
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            
            if(window.innerWidth < 768) {
                canvas.width = 400;
                canvas.height = 300;
            }
            
            let player = { 
                x: 40, 
                y: canvas.height - 80, 
                vy: 0, 
                jumping: false,
                width: 28,
                height: 28
            };
            
            const gravity = 0.5;
            const jumpForce = -11;
            const groundY = canvas.height - 50;
            const speed = 6;
            
            const goal = { 
                x: canvas.width - 70, 
                y: groundY - 40, 
                w: 45, 
                h: 45 
            };
            
            let reached = false;
            let particles = [];
            
            function drawHeart(x, y, size, color) {
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.moveTo(x + size/2, y + size/4);
                ctx.bezierCurveTo(x + size/2, y, x, y, x, y + size/4);
                ctx.bezierCurveTo(x, y + size/2, x + size/2, y + size, x + size/2, y + size);
                ctx.bezierCurveTo(x + size/2, y + size, x + size, y + size/2, x + size, y + size/4);
                ctx.bezierCurveTo(x + size, y, x + size/2, y, x + size/2, y + size/4);
                ctx.fill();
            }
            
            function createGoalParticles(x, y) {
                for(let i = 0; i < 20; i++) {
                    particles.push({
                        x: x + goal.w/2,
                        y: y + goal.h/2,
                        vx: (Math.random() - 0.5) * 8,
                        vy: (Math.random() - 0.5) * 8,
                        life: 60,
                        color: ['#b71c1c', '#b8860b', '#ff6b9d'][Math.floor(Math.random()*3)]
                    });
                }
            }
            
            function draw() {
                if(!document.getElementById('scene-game')?.classList.contains('active')) return;
                
                const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, '#e4d5b7');
                gradient.addColorStop(1, '#c9b896');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = 'rgba(62, 39, 35, 0.03)';
                for(let i = 0; i < canvas.width; i += 20) {
                    for(let j = 0; j < canvas.height; j += 20) {
                        if(Math.random() > 0.7) {
                            ctx.fillRect(i + Math.random()*10, j + Math.random()*10, 2, 2);
                        }
                    }
                }
                
                ctx.fillStyle = "#5d4037";
                ctx.fillRect(0, groundY + 28, canvas.width, 22);
                ctx.fillStyle = "#3e2723";
                ctx.fillRect(0, groundY + 25, canvas.width, 5);
                
                ctx.strokeStyle = "rgba(184, 134, 11, 0.5)";
                ctx.setLineDash([5, 3]);
                ctx.beginPath();
                ctx.moveTo(0, groundY + 30);
                ctx.lineTo(canvas.width, groundY + 30);
                ctx.stroke();
                ctx.setLineDash([]);
                
                if(!reached) {
                    const pulse = 1 + Math.sin(Date.now() / 200) * 0.1;
                    drawHeart(goal.x, goal.y, goal.w * pulse, "#b71c1c");
                    ctx.strokeStyle = "rgba(184, 134, 11, 0.6)";
                    ctx.lineWidth = 2;
                    drawHeart(goal.x, goal.y, goal.w * pulse + 4, "transparent");
                    ctx.stroke();
                } else {
                    drawHeart(goal.x, goal.y, goal.w, "#4ade80");
                }
                
                ctx.fillStyle = reached ? "#4ade80" : "#b71c1c";
                ctx.fillRect(player.x, player.y, player.width, player.height);
                
                ctx.strokeStyle = "#3e2723";
                ctx.lineWidth = 2;
                ctx.strokeRect(player.x, player.y, player.width, player.height);
                
                ctx.fillStyle = "#fff";
                ctx.fillRect(player.x + 6, player.y + 8, 6, 6);
                ctx.fillRect(player.x + 16, player.y + 8, 6, 6);
                ctx.fillStyle = "#000";
                ctx.fillRect(player.x + 8, player.y + 10, 3, 3);
                ctx.fillRect(player.x + 18, player.y + 10, 3, 3);
                
                particles.forEach((p, index) => {
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                    ctx.fill();
                    
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.2;
                    p.life--;
                    
                    if(p.life <= 0) particles.splice(index, 1);
                });
                
                if(reached) {
                    ctx.fillStyle = "rgba(62, 39, 35, 0.9)";
                    ctx.font = "bold 22px 'Cinzel', serif";
                    ctx.textAlign = "center";
                    ctx.fillText("✨ ¡LO LOGRASTE! ♾️", canvas.width/2, 60);
                    
                    ctx.font = "16px 'Special Elite', cursive";
                    ctx.fillStyle = "rgba(62, 39, 35, 0.7)";
                    ctx.fillText("Nuestro amor no tiene límites", canvas.width/2, 85);
                }
                
                if(!reached) {
                    ctx.fillStyle = "rgba(62, 39, 35, 0.6)";
                    ctx.font = "13px 'Special Elite', cursive";
                    ctx.textAlign = "left";
                    ctx.fillText("← → mover | ESPACIO saltar", 15, 25);
                }
                
                player.vy += gravity;
                player.y += player.vy;
                
                if(player.y >= groundY) {
                    player.y = groundY;
                    player.vy = 0;
                    player.jumping = false;
                }
                
                if(!reached && 
                   player.x < goal.x + goal.w && 
                   player.x + player.width > goal.x && 
                   player.y < goal.y + goal.h &&
                   player.y + player.height > goal.y) {
                    reached = true;
                    createGoalParticles(goal.x, goal.y);
                    canvas.style.animation = 'pulse 0.3s ease';
                    setTimeout(() => canvas.style.animation = '', 300);
                }
                
                requestAnimationFrame(draw);
            }
            
            const keys = {};
            window.onkeydown = (e) => {
                keys[e.key] = true;
                if(e.key === "ArrowRight") player.x = Math.min(player.x + speed, canvas.width - player.width - 10);
                if(e.key === "ArrowLeft") player.x = Math.max(player.x - speed, 10);
                if(e.key === " " && !player.jumping) {
                    player.vy = jumpForce;
                    player.jumping = true;
                    e.preventDefault();
                }
            };
            window.onkeyup = (e) => { keys[e.key] = false; };
            
            let touchStartX = 0;
            canvas.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                e.preventDefault();
            }, { passive: false });
            
            canvas.addEventListener('touchmove', (e) => {
                const touchX = e.touches[0].clientX;
                const diff = touchX - touchStartX;
                if(diff > 10) {
                    player.x = Math.min(player.x + speed, canvas.width - player.width - 10);
                    touchStartX = touchX;
                } else if(diff < -10) {
                    player.x = Math.max(player.x - speed, 10);
                    touchStartX = touchX;
                }
                e.preventDefault();
            }, { passive: false });
            
            canvas.addEventListener('touchend', (e) => {
                if(!player.jumping) {
                    player.vy = jumpForce;
                    player.jumping = true;
                }
                e.preventDefault();
            }, { passive: false });
            
            draw();
            
            const originalBack = document.querySelector('#scene-game .back-btn').onclick;
            document.querySelector('#scene-game .back-btn').onclick = () => {
                reached = false;
                player = { x: 40, y: groundY, vy: 0, jumping: false, width: 28, height: 28 };
                particles = [];
                openScene('scene-map');
            };
        }

        // ============================================
        // ✨ 7. PARTÍCULAS MÁGICAS FLOTANTES
        // ============================================
        function createParticles() {
            const container = document.getElementById('particles');
            if(!container) return;
            
            setInterval(() => {
                if(Math.random() > 0.3) {
                    const p = document.createElement('div');
                    const drift = (Math.random() - 0.5) * 100;
                    p.style.cssText = `
                        position: absolute;
                        width: ${2 + Math.random()*4}px;
                        height: ${2 + Math.random()*4}px;
                        background: var(--gold);
                        border-radius: 50%;
                        left: ${Math.random()*100}%;
                        top: 100%;
                        opacity: ${0.3 + Math.random()*0.5};
                        --drift: ${drift}px;
                        animation: floatUp ${3 + Math.random()*3}s ease-out forwards;
                        pointer-events: none;
                        box-shadow: 0 0 6px var(--gold);
                    `;
                    container.appendChild(p);
                    setTimeout(() => p.remove(), 6000);
                }
            }, 600);
            
            for(let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const p = document.createElement('div');
                    const drift = (Math.random() - 0.5) * 100;
                    p.style.cssText = `
                        position: absolute;
                        width: ${2 + Math.random()*4}px;
                        height: ${2 + Math.random()*4}px;
                        background: var(--gold);
                        border-radius: 50%;
                        left: ${Math.random()*100}%;
                        top: ${Math.random()*50 + 25}%;
                        opacity: ${0.2 + Math.random()*0.4};
                        --drift: ${drift}px;
                        animation: floatUp ${4 + Math.random()*4}s ease-out forwards;
                        pointer-events: none;
                        box-shadow: 0 0 6px var(--gold);
                    `;
                    container.appendChild(p);
                    setTimeout(() => p.remove(), 8000);
                }, i * 200);
            }
        }

        // ============================================
        // 🚀 INICIALIZACIÓN
        // ============================================
        document.querySelectorAll('.marker, .win95-icon-item, button').forEach(el => {
            el.addEventListener('contextmenu', e => e.preventDefault());
        });

        document.addEventListener('keydown', (e) => {
            if(e.key === 'Escape') {
                const modal = document.querySelector('.win95-modal-overlay');
                if(modal) modal.remove();
            }
        });

        window.addEventListener('resize', () => {
            const canvas = document.getElementById('game-canvas');
            if(canvas && window.innerWidth < 768) {
                canvas.width = 400;
                canvas.height = 300;
            }
        });

        console.log('%c✨ Sempiterno ♾️ ✨', 'color: #b8860b; font-size: 16px; font-weight: bold;');
        console.log('%cHecho con amor para Niurka 💕', 'color: #b71c1c; font-style: italic;');
    </script>
</body>
</html>
